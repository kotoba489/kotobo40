# キーボード名の指定（16文字以内）
CONFIG_ZMK_KEYBOARD_NAME="kgrid40"

# ポインティングデバイス（マウス操作）の有効化
CONFIG_ZMK_POINTING=y

# Bluetooth 接続の安定性を最大化 (+8dB)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetooth 接続の信頼性を向上させる実験的機能を有効化（重要）
# Mac mini などとの接続・切り替えの安定性が向上します
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# 接続パラメータの最適化
# スリープ復帰やデバイス切り替え時のレスポンスを速めます
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# Bluetooth と USB の有効化
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# バッテリー残量の報告を有効化
CONFIG_ZMK_BATTERY_REPORTING=y

# 省電力設定（必要に応じて # を外して有効化）
# CONFIG_ZMK_SLEEP=y

# ZMK Studio 対応
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
# USB CDC ACM（ZMK StudioのUSBシリアルポート）を明示的に有効化
CONFIG_USB_CDC_ACM=y
